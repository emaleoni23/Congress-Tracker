// ── Importi ──────────────────────────────────────────────────────────────────
function parseAmount(str) {
  if (!str) return 0;
  const ranges = {
    "$1,001 - $15,000": 8000,
    "$15,001 - $50,000": 32500,
    "$50,001 - $100,000": 75000,
    "$100,001 - $250,000": 175000,
    "$250,001 - $500,000": 375000,
    "$500,001 - $1,000,000": 750000,
    "$1,000,001 - $5,000,000": 3000000,
    "$5,000,001 - $25,000,000": 15000000,
    "Over $25,000,000": 25000000,
  };
  return ranges[str] || 0;
}

function formatAmount(n) {
  if (n >= 1000000) return "$" + (n / 1000000).toFixed(1) + "M";
  if (n >= 1000)    return "$" + (n / 1000).toFixed(0) + "K";
  return "$" + n.toLocaleString();
}

  return (amountNum / netWorth) * 100;

  if (pct === null) return null;
  if (pct >= 10)   return pct.toFixed(1) + "%";
  if (pct >= 1)    return pct.toFixed(2) + "%";
  if (pct >= 0.01) return pct.toFixed(3) + "%";
  return "<0.001%";
}

// ── Tipo strumento (azione, opzione, ecc.) ────────────────────────────────────
function parseInstrument(type, description) {
  var src = ((type || "") + " " + (description || "")).toLowerCase();
  if (src.includes("call option") || src.includes("call"))         return { label: "CALL",   color: "#00D4AA", desc: "Opzione Call — diritto di acquisto a prezzo fisso. Leva al rialzo." };
  if (src.includes("put option")  || src.includes("put"))          return { label: "PUT",    color: "#FF4455", desc: "Opzione Put — diritto di vendita a prezzo fisso. Leva al ribasso." };
  if (src.includes("option"))                                       return { label: "OPTION", color: "#FFB347", desc: "Opzione — strumento derivato con leva finanziaria." };
  if (src.includes("etf") || src.includes("fund"))                 return { label: "ETF",    color: "#00C8FF", desc: "ETF — fondo indicizzato, nessuna leva implicita." };
  if (src.includes("bond") || src.includes("treasury") || src.includes("note")) return { label: "BOND", color: "#8AA0C0", desc: "Obbligazione — strumento a reddito fisso." };
  if (src.includes("reit"))                                         return { label: "REIT",   color: "#C084FC", desc: "REIT — fondo immobiliare quotato." };
  return { label: "STOCK", color: "#C8D8F0", desc: "Azione ordinaria — nessuna leva implicita." };
}

// Calcola giorni tra due date
function daysBetween(dateStr1, dateStr2) {
  var d1 = new Date(dateStr1);
  var d2 = new Date(dateStr2);
  return Math.abs((d1 - d2) / (1000 * 60 * 60 * 24));
}

// ── FATTORE 1: Correlazione settore/commissione (0-40 punti) ──────────────────
function scoreCommitteeCorrelation(role, sector, tier) {
  if (!role || !sector) return { score: 0, reason: null };

  // Leadership totale → accesso universale, punteggio base per qualsiasi settore
  if (tier === 1) return { score: 30, reason: "Leadership con accesso a tutta la legislazione" };
  if (tier === 2) return { score: 20, reason: "Whip con visione completa dei voti imminenti" };

  var sectors = COMMITTEE_SECTORS[role] || [];
  if (sectors.length === 0) return { score: 0, reason: null };

  if (sectors.indexOf(sector) !== -1) {
    return { score: 40, reason: "Settore coincide con commissione di appartenenza (" + role + ")" };
  }
  return { score: 0, reason: null };
}

// ── FATTORE 2: Timing rispetto a legislazione (0-35 punti) ───────────────────
function scoreLegislationTiming(sector, tradeDate) {
  if (!sector || !tradeDate) return { score: 0, reason: null };

  var relevant = RECENT_LEGISLATION.filter(function(l) { return l.sector === sector; });
  var bestScore = 0;
  var bestReason = null;

  relevant.forEach(function(law) {
    var days = daysBetween(tradeDate, law.date);
    var score = 0;
    if (days <= 14)  score = 35;
    else if (days <= 30)  score = 28;
    else if (days <= 60)  score = 18;
    else if (days <= 90)  score = 8;

    if (score > bestScore) {
      bestScore = score;
      var direction = new Date(tradeDate) < new Date(law.date) ? "prima" : "dopo";
      bestReason = Math.round(days) + " giorni " + direction + ": \"" + law.title + "\" — " + law.desc;
    }
  });

  return { score: bestScore, reason: bestReason };
}

// ── FATTORE 3: Volume anomalo rispetto allo storico del membro (0-25 punti) ──
function scoreVolumeAnomaly(amountNum, memberTrades) {
  if (!amountNum || !memberTrades || memberTrades.length < 3) {
    // Punteggio base per importo assoluto se non abbiamo storico
    if (amountNum >= 1000000) return { score: 25, reason: "Importo superiore a $1M (assoluto)" };
    if (amountNum >= 500000)  return { score: 18, reason: "Importo superiore a $500K (assoluto)" };
    if (amountNum >= 250000)  return { score: 10, reason: "Importo superiore a $250K (assoluto)" };
    if (amountNum >= 100000)  return { score: 5,  reason: "Importo superiore a $100K (assoluto)" };
    return { score: 0, reason: null };
  }

  var amounts = memberTrades.map(function(t) { return t.amountNum || 0; }).sort(function(a,b) { return b-a; });
  var p75 = amounts[Math.floor(amounts.length * 0.25)];
  var p90 = amounts[Math.floor(amounts.length * 0.10)];
  var avg  = amounts.reduce(function(s,v) { return s+v; }, 0) / amounts.length;

  if (amountNum >= p90 && p90 > 0) return { score: 25, reason: "Top 10% delle operazioni storiche del membro (media: " + formatAmount(avg) + ")" };
  if (amountNum >= p75 && p75 > 0) return { score: 15, reason: "Top 25% delle operazioni storiche del membro (media: " + formatAmount(avg) + ")" };
  if (amountNum >= avg && avg > 0)  return { score: 8,  reason: "Superiore alla media storica del membro (" + formatAmount(avg) + ")" };
  return { score: 3, reason: "Nella norma rispetto allo storico del membro" };
}

// ── SCORE FINALE ──────────────────────────────────────────────────────────────
function calcAnomalyScore(trade, allTrades) {
  var memberTrades = allTrades.filter(function(t) {
    return t.representative === trade.representative && t.id !== trade.id;
  });

  var f1 = scoreCommitteeCorrelation(trade.role, trade.sector, trade.tier);
  var f2 = scoreLegislationTiming(trade.sector, trade.transaction_date);
  var f3 = scoreVolumeAnomaly(trade.amountNum, memberTrades);

  // Bonus: opzioni = leva → +10 se call/put
  var leverageBonus = 0;
  var leverageReason = null;
  if (trade.instrument && (trade.instrument.label === "CALL" || trade.instrument.label === "PUT")) {
    leverageBonus = 10;
    leverageReason = "Uso di opzioni (" + trade.instrument.label + ") amplifica l'anomalia";
  }

  var total = Math.min(100, f1.score + f2.score + f3.score + leverageBonus);

  var reasons = [];
  if (f1.reason) reasons.push("📊 Commissione: " + f1.reason);
  if (f2.reason) reasons.push("⏱ Timing: " + f2.reason);
  if (f3.reason) reasons.push("💰 Volume: " + f3.reason);
  if (leverageReason) reasons.push("⚡ Leva: " + leverageReason);

  var level, color, bg, border;
  if (total >= 66) {
    level = "ALTO"; color = "#FF4455"; bg = "#2A0A0A"; border = "#6A1A1A";
  } else if (total >= 36) {
    level = "MEDIO"; color = "#FFB347"; bg = "#2A1800"; border = "#6A4000";
  } else {
    level = "BASSO"; color = "#00D4AA"; bg = "#002A1A"; border = "#006A40";
  }

  return { score: total, level: level, color: color, bg: bg, border: border, reasons: reasons,
    breakdown: { committee: f1.score, timing: f2.score, volume: f3.score, leverage: leverageBonus } };
}

  // getMemberInfo dinamico — usa il registry aggiornato dalle API
  var getMemberInfo = useCallback(function(name) {
    for (var key in roleRegistry) {
      if (name && name.toLowerCase().includes(key.toLowerCase())) return roleRegistry[key];
    }
    return { role: null, tier: 0 };
  }, [roleRegistry]);

  var parseTrade = useCallback(function(t, i) {
    var ticker = (t.ticker || "").replace(/[^A-Z]/g, "") || "N/A";
    var rep    = t.representative || t.Senator || "Unknown";
    var info   = getMemberInfo(rep);
    var amtNum = parseAmount(t.amount);
    var nw     = getNetWorth(rep);
    var instr  = parseInstrument(t.type, t.asset_description || t.description || "");
    return {
      id: rep + "-" + t.transaction_date + "-" + ticker + "-" + i,
      representative: rep,
      ticker: ticker,
      transaction_date: t.transaction_date,
      type: t.type || "Unknown",
      amount: t.amount || "Unknown",
      amountNum: amtNum,
      sector: getSector(ticker),
      isNew: false,
      role: info.role,
      tier: info.tier,
      netWorth: nw,
      wealthPct: calcWealthPct(amtNum, nw),
      instrument: instr,
      anomaly: null, // calcolato dopo con enrichTrades
    };
  }, [getMemberInfo]);

  // Arricchisce le trade con lo score anomalia usando lo storico completo
  var enrichTrades = useCallback(function(tradeList) {
    return tradeList.map(function(t) {
      return Object.assign({}, t, { anomaly: calcAnomalyScore(t, tradeList) });
    });
  }, []);

  // ── Congress.gov: ruoli live ─────────────────────────────────────────────
  var fetchCongressRoles = useCallback(async function(apiKey) {
    if (!apiKey) return;
    setApiStatus(function(s) { return Object.assign({}, s, { congress: "loading" }); });
    try {
      var res = await fetch(
        "https://api.congress.gov/v3/member?currentMember=true&limit=250&api_key=" + apiKey
      );
      if (!res.ok) throw new Error("Congress API " + res.status);
      var data = await res.json();
      var members = data.members || [];
      var newRoles = Object.assign({}, STATIC_ROLES);
      members.forEach(function(m) {
        var leadership = m.leadership || [];
        var bestTier = 0;
        var bestRole = null;
        leadership.forEach(function(l) {
          var tier = getTierFromTitle(l.type);
          if (tier > bestTier) { bestTier = tier; bestRole = l.type; }
        });
        if (bestTier > 0 && m.name) {
          var label = (bestRole || "")
            .replace("House ", "").replace("Senate ", "")
            .replace("Majority ", "Maj. ").replace("Minority ", "Min. ")
            .replace("Committee on ", "").slice(0, 22);
          newRoles[m.name] = { role: label, tier: bestTier };
        }
      });
      setRoleRegistry(newRoles);
      setApiStatus(function(s) { return Object.assign({}, s, { congress: "ok" }); });
    } catch (e) {
      console.warn("Congress.gov:", e.message);
      setApiStatus(function(s) { return Object.assign({}, s, { congress: "error" }); });
    }
  }, []);

  // ── Quiver: top trader live ──────────────────────────────────────────────
  var fetchQuiverTopTraders = useCallback(async function(apiKey) {
    if (!apiKey) return;
    setApiStatus(function(s) { return Object.assign({}, s, { quiver: "loading" }); });
    try {
      var res = await fetch("https://api.quiverquant.com/beta/bulk/congresstrading", {
        headers: { "Authorization": "Token " + apiKey, "Accept": "application/json" },
      });
      if (!res.ok) throw new Error("Quiver API " + res.status);
      var data = await res.json();
      var cutoff = new Date();
      cutoff.setFullYear(cutoff.getFullYear() - 1);
      var volumeMap = {};
      data.forEach(function(t) {
        var d = new Date(t.Date || t.TransactionDate);
        if (d < cutoff) return;
        var name = t.Representative || t.Senator;
        if (!name) return;
        volumeMap[name] = (volumeMap[name] || 0) + (parseAmount(t.Amount) || 0);
      });
      var sorted = Object.entries(volumeMap).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 10);
      setRoleRegistry(function(prev) {
        var updated = Object.assign({}, prev);
        sorted.forEach(function(entry) {
          var name = entry[0];
          var vol  = entry[1];
          var ex   = updated[name];
          if (!ex || ex.tier >= 4) {
            updated[name] = { role: "Top Trader · " + formatAmount(vol), tier: 4 };
          }
        });
        return updated;
      });
      setApiStatus(function(s) { return Object.assign({}, s, { quiver: "ok" }); });
    } catch (e) {
      console.warn("Quiver:", e.message);
      setApiStatus(function(s) { return Object.assign({}, s, { quiver: "error" }); });
    }
  }, []);

  // ── Fetch operazioni: fase 1 veloce + fase 2 background ─────────────────
  var fetchTrades = useCallback(async function() {
    // Fase 1 — file leggero con ultime transazioni
    try {
      setLoadPhase("fast");
      var r1 = await fetch("https://house-stock-watcher-data.s3-us-west-2.amazonaws.com/data/fillings.json");
      if (!r1.ok) throw new Error("fast failed");
      var raw1 = await r1.json();
      var recent = raw1.slice(0, 100).map(parseTrade);
      var newOnes1 = recent.filter(function(t) { return !prevIds.current.has(t.id); });
      newOnes1.forEach(function(t) { prevIds.current.add(t.id); });
      if (newOnes1.length > 0) {
        setTrades(function(prev) {
          return newOnes1.concat(prev).sort(function(a, b) {
            return new Date(b.transaction_date) - new Date(a.transaction_date);
          });
        });
        setLastUpdate(new Date());
        setLoading(false);
      }
    } catch (e) {
      console.warn("Fast endpoint:", e.message);
    }
    setLoadPhase("full");

    // Fase 2 — dataset completo in background
    try {
      var r2 = await fetch("https://house-stock-watcher-data.s3-us-west-2.amazonaws.com/data/all_transactions.json");
      if (!r2.ok) throw new Error("full failed");
      var raw2 = await r2.json();
      var all = raw2.map(parseTrade).sort(function(a, b) {
        return new Date(b.transaction_date) - new Date(a.transaction_date);
      });
      all.forEach(function(t) { prevIds.current.add(t.id); });
      setTrades(enrichTrades(all));
      setLastUpdate(new Date());
      setLoading(false);
      setLoadPhase("done");
    } catch (e) {
      console.warn("Full dataset:", e.message);
      setLoadPhase("error");
      setTrades(function(prev) {
        if (prev.length === 0) {
          var mock = generateMockTrades(50);
          mock.forEach(function(t) { prevIds.current.add(t.id); });
          setLoading(false);
          setLastUpdate(new Date());
          return enrichTrades(mock);
        }
        return prev;
      });
    }
  }, [parseTrade]);

    fetchTrades();

      setTrades(function(prev) {
        if (prev.length > 0 && Math.random() > 0.4) {

            role: info.role,

          });
          setLastUpdate(new Date());
          return [newTrade].concat(prev.slice(0, 199));
        }
        return prev;
      });
    }, 8000);
    return function() { clearInterval(interval); };

  // Filtri
  useEffect(function() {
    var result = trades.slice();
    if (filters.member.trim()) {
      var q = filters.member.toLowerCase();
      result = result.filter(function(t) {
        return t.representative.toLowerCase().includes(q) || t.ticker.toLowerCase().includes(q);
      });
    }
    if (filters.sector !== "All") result = result.filter(function(t) { return t.sector === filters.sector; });
    if (filters.type   !== "All") result = result.filter(function(t) { return t.type.toLowerCase().includes(filters.type.toLowerCase()); });
    if (filters.minAmount > 0)    result = result.filter(function(t) { return t.amountNum >= filters.minAmount; });
    if (filters.minRisk !== "All") {
      var minScore = filters.minRisk === "ALTO" ? 66 : filters.minRisk === "MEDIO" ? 36 : 0;
      var maxScore = filters.minRisk === "MEDIO" ? 65 : 100;
      result = result.filter(function(t) {
        var s = t.anomaly ? t.anomaly.score : 0;
        return s >= minScore && s <= maxScore;
      });
    }
    setFiltered(result);
  }, [trades, filters]);

  // Ticker scorrevole
  useEffect(function() {
    if (trades.length > 0) {
      var text = trades.slice(0, 15).map(function(t) {
        return t.ticker + " · " + t.representative.split(" ").pop() + " · " + (t.type === "Purchase" ? "▲" : "▼") + " " + t.amount;
      }).join("   ░░░   ");
      setTickerText(text);
    }
  }, [trades]);

        marginRight: "5px", verticalAlign: "middle",
      }} />

                  {apiStatus.congress === "ok" ? "Connesso" : apiStatus.congress === "error" ? "Errore" : apiStatus.congress === "loading" ? "..." : "Non configurato"}
                </span>
              </div>
              <input type="password" placeholder="Incolla la tua API key…" value={keyDraft.congress}
                onChange={function(e) { setKeyDraft(function(d) { return Object.assign({}, d, { congress: e.target.value }); }); }}
                style={{ width: "100%", background: "#050810", border: "1px solid #1A2A4A", color: "#C8D8F0", padding: "9px 12px", fontSize: "12px", fontFamily: "'Courier New', monospace", borderRadius: "2px", boxSizing: "border-box", outline: "none" }}
              />
              <div style={{ fontSize: "10px", color: "#4A6A9A", marginTop: "5px" }}>Gratuita → api.congress.gov/sign-up</div>
            </div>

            <div style={{ marginBottom: "24px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "6px" }}>
                <label style={{ fontSize: "11px", color: "#C084FC", letterSpacing: "0.1em" }}>QUIVER QUANTITATIVE API KEY</label>
                <span style={{ fontSize: "10px", color: "#4A6A9A" }}>
                  <StatusDot status={apiStatus.quiver} />
                  {apiStatus.quiver === "ok" ? "Connesso" : apiStatus.quiver === "error" ? "Errore" : apiStatus.quiver === "loading" ? "..." : "Non configurato"}
                </span>
              </div>
              <input type="password" placeholder="Incolla la tua API key…" value={keyDraft.quiver}
                onChange={function(e) { setKeyDraft(function(d) { return Object.assign({}, d, { quiver: e.target.value }); }); }}
                style={{ width: "100%", background: "#050810", border: "1px solid #1A2A4A", color: "#C8D8F0", padding: "9px 12px", fontSize: "12px", fontFamily: "'Courier New', monospace", borderRadius: "2px", boxSizing: "border-box", outline: "none" }}
              />
              <div style={{ fontSize: "10px", color: "#4A6A9A", marginTop: "5px" }}>Piano free → quiverquant.com</div>
            </div>

            <div style={{ display: "flex", gap: "10px" }}>
              <button onClick={function() { saveKeys(keyDraft); setKeys(Object.assign({}, keyDraft)); setShowSetup(false); }}
                style={{ flex: 1, background: "#00D4AA", color: "#050810", border: "none", padding: "10px", fontSize: "12px", fontFamily: "'Courier New', monospace", fontWeight: "bold", cursor: "pointer", borderRadius: "2px" }}>
                SALVA E CONNETTI
              </button>
              <button onClick={function() { setShowSetup(false); }}
                style={{ background: "transparent", color: "#4A6A9A", border: "1px solid #1A2A4A", padding: "10px 16px", fontSize: "12px", fontFamily: "'Courier New', monospace", cursor: "pointer", borderRadius: "2px" }}>
                Annulla
              </button>
            </div>
            <div style={{ marginTop: "14px", fontSize: "10px", color: "#2A3A5A" }}>
              Le chiavi sono salvate solo nel tuo browser (localStorage).
            </div>
          </div>
        </div>
      )}

      {/* DETAIL MODAL */}
      {selectedTrade && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.88)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center" }}
          onClick={function() { setSelectedTrade(null); setTickerDetail(null); }}>
          <div style={{ background: "#0A0F1E", border: "1px solid #1A2A4A", borderRadius: "6px", padding: "28px", width: "560px", maxWidth: "95vw", maxHeight: "90vh", overflowY: "auto" }}
            onClick={function(e) { e.stopPropagation(); }}>

            {/* Intestazione */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "20px" }}>
              <div>
                <div style={{ fontSize: "10px", color: "#4A6A9A", letterSpacing: "0.2em", marginBottom: "4px" }}>DETTAGLIO OPERAZIONE</div>
                <div style={{ fontSize: "24px", fontWeight: "bold", color: "#E8F4FF" }}>{selectedTrade.ticker}</div>
                {detailLoading && <div style={{ fontSize: "11px", color: "#4A6A9A", animation: "pulse 1s ease-in-out infinite" }}>Caricamento dati mercato...</div>}
                {tickerDetail && !detailLoading && <div style={{ fontSize: "13px", color: "#8AA0C0", marginTop: "2px" }}>{tickerDetail.longName}</div>}
              </div>
              <button onClick={function() { setSelectedTrade(null); setTickerDetail(null); }}
                style={{ background: "transparent", border: "1px solid #1A2A4A", color: "#4A6A9A", width: "28px", height: "28px", borderRadius: "2px", cursor: "pointer", fontSize: "14px", fontFamily: "monospace" }}>✕</button>
            </div>

            {/* Dati ticker: ISIN + mercato */}
            {tickerDetail && (
              <div>
                {/* ISIN / CUSIP / FIGI in evidenza */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "10px", marginBottom: "14px" }}>
                  {[
                    { label: "ISIN",  value: tickerDetail.isin,  color: tickerDetail.isin  ? "#00D4AA" : null },
                    { label: "CUSIP", value: tickerDetail.cusip, color: tickerDetail.cusip ? "#00C8FF" : null },
                    { label: "FIGI",  value: tickerDetail.figi,  color: "#8AA0C0" },
                  ].map(function(item) {
                    return (
                      <div key={item.label} style={{ background: "#080C18", border: "1px solid " + (item.color ? item.color + "44" : "#1A2A4A"), padding: "10px 12px", borderRadius: "3px", borderTop: "2px solid " + (item.color || "#1A2A4A") }}>
                        <div style={{ fontSize: "9px", color: "#4A6A9A", letterSpacing: "0.15em", marginBottom: "5px" }}>{item.label}</div>
                        <div style={{ fontSize: "11px", color: item.value ? (item.color || "#C8D8F0") : "#2A3A5A", fontWeight: "bold", fontFamily: "monospace", wordBreak: "break-all" }}>
                          {item.value || "Non disponibile"}
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Dati mercato */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "10px", marginBottom: "20px" }}>
                  {[
                    { label: "NOME COMPLETO", value: tickerDetail.longName },
                    { label: "EXCHANGE",      value: tickerDetail.exchange },
                    { label: "SETTORE FIGI",  value: tickerDetail.marketSector },
                    { label: "TIPO",          value: tickerDetail.type },
                    { label: "VALUTA",        value: tickerDetail.currency },
                    { label: "TIMEZONE",      value: tickerDetail.timezone },
                    tickerDetail.currentPrice ? { label: "PREZZO ATTUALE", value: tickerDetail.currency + " " + tickerDetail.currentPrice.toFixed(2), color: "#00D4AA" } : null,
                    tickerDetail.prevClose    ? { label: "CHIUSURA PREC.", value: tickerDetail.currency + " " + tickerDetail.prevClose.toFixed(2) } : null,
                    tickerDetail.currentPrice && tickerDetail.prevClose ? {
                      label: "VARIAZIONE",
                      value: (((tickerDetail.currentPrice - tickerDetail.prevClose) / tickerDetail.prevClose) * 100).toFixed(2) + "%",
                      color: tickerDetail.currentPrice >= tickerDetail.prevClose ? "#00D4AA" : "#FF4455",
                    } : null,
                  ].filter(Boolean).map(function(item) {
                    return (
                      <div key={item.label} style={{ background: "#080C18", border: "1px solid #1A2A4A", padding: "10px 12px", borderRadius: "3px" }}>
                        <div style={{ fontSize: "9px", color: "#4A6A9A", letterSpacing: "0.15em", marginBottom: "4px" }}>{item.label}</div>
                        <div style={{ fontSize: "12px", color: item.color || "#C8D8F0", fontWeight: item.color ? "bold" : "normal", wordBreak: "break-word" }}>{item.value || "—"}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* SCORE ANOMALIA */}
            {selectedTrade.anomaly && (
              <div style={{ background: selectedTrade.anomaly.bg, border: "1px solid " + selectedTrade.anomaly.border, borderRadius: "4px", padding: "16px", marginBottom: "20px" }}>
                <div style={{ display: "flex", alignItems: "center", gap: "16px", marginBottom: "14px" }}>
                  <div style={{
                    width: "56px", height: "56px", borderRadius: "50%",
                    background: selectedTrade.anomaly.color,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: "18px", fontWeight: "bold", color: "#050810",
                    boxShadow: "0 0 16px " + selectedTrade.anomaly.color + "88", flexShrink: 0,
                  }}>{selectedTrade.anomaly.score}</div>
                  <div>
                    <div style={{ fontSize: "10px", color: "#4A6A9A", letterSpacing: "0.2em", marginBottom: "4px" }}>INDICE ANOMALIA INSIDER</div>
                    <div style={{ fontSize: "20px", fontWeight: "bold", color: selectedTrade.anomaly.color }}>
                      RISCHIO {selectedTrade.anomaly.level}
                    </div>
                    <div style={{ fontSize: "11px", color: "#4A6A9A", marginTop: "2px" }}>
                      Commissione {selectedTrade.anomaly.breakdown.committee}/40 · Timing {selectedTrade.anomaly.breakdown.timing}/35 · Volume {selectedTrade.anomaly.breakdown.volume}/25 · Leva {selectedTrade.anomaly.breakdown.leverage}/10
                    </div>
                  </div>
                </div>
                {selectedTrade.anomaly.reasons.length > 0 && (
                  <div style={{ borderTop: "1px solid " + selectedTrade.anomaly.border, paddingTop: "12px" }}>
                    <div style={{ fontSize: "10px", color: "#4A6A9A", letterSpacing: "0.15em", marginBottom: "8px" }}>FATTORI RILEVATI</div>
                    {selectedTrade.anomaly.reasons.map(function(r, i) {
                      return (
                        <div key={i} style={{ fontSize: "11px", color: "#8AA0C0", marginBottom: "6px", lineHeight: "1.5", paddingLeft: "4px", borderLeft: "2px solid " + selectedTrade.anomaly.color + "66" }}>
                          {r}
                        </div>
                      );
                    })}
                  </div>
                )}
                {selectedTrade.anomaly.reasons.length === 0 && (
                  <div style={{ fontSize: "11px", color: "#4A6A9A" }}>Nessun fattore di rischio rilevato. Operazione nella norma.</div>
                )}
              </div>
            )}

            {/* Divisore */}
            <div style={{ borderTop: "1px solid #1A2A4A", marginBottom: "20px" }} />

            {/* Dati operazione */}
            <div style={{ fontSize: "10px", color: "#4A6A9A", letterSpacing: "0.2em", marginBottom: "12px" }}>DATI OPERAZIONE DICHIARATA</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px", marginBottom: "20px" }}>
              {[
                { label: "MEMBRO",              value: selectedTrade.representative },
                { label: "RUOLO",               value: selectedTrade.role || "Membro del Congresso" },
                { label: "DATA OPERAZIONE",     value: selectedTrade.transaction_date },
                { label: "TIPO",                value: selectedTrade.type },
                { label: "IMPORTO DICHIARATO",  value: selectedTrade.amount, color: "#FFB347" },
                { label: "SETTORE",             value: selectedTrade.sector },
                { label: "PATRIMONIO STIMATO",  value: selectedTrade.netWorth ? formatAmount(selectedTrade.netWorth) : "Non disponibile", color: "#8AA0C0" },
                { label: "% PATRIMONIO",        value: selectedTrade.wealthPct ? formatPct(selectedTrade.wealthPct) : "Non disponibile",
                  color: selectedTrade.wealthPct ? (selectedTrade.wealthPct >= 5 ? "#FF4455" : selectedTrade.wealthPct >= 1 ? "#FFB347" : "#8AA0C0") : null },
              ].map(function(item) {
                var ts = selectedTrade.tier > 0 ? TIER_STYLE[selectedTrade.tier] : null;
                return (
                  <div key={item.label} style={{ background: ts && item.label === "RUOLO" ? ts.bg : "#080C18", border: "1px solid " + (ts && item.label === "RUOLO" ? ts.border : "#1A2A4A"), padding: "10px 12px", borderRadius: "3px" }}>
                    <div style={{ fontSize: "9px", color: "#4A6A9A", letterSpacing: "0.15em", marginBottom: "4px" }}>{item.label}</div>
                    <div style={{ fontSize: "12px", color: item.color || (ts && item.label === "RUOLO" ? ts.color : "#C8D8F0"), fontWeight: item.color || (ts && item.label === "RUOLO") ? "bold" : "normal" }}>{item.value || "—"}</div>
                  </div>
                );
              })}
            </div>

            {/* Tipo strumento */}
            {selectedTrade.instrument && (
              <div style={{ background: "#080C18", border: "1px solid " + selectedTrade.instrument.color + "44", borderLeft: "3px solid " + selectedTrade.instrument.color, padding: "10px 14px", borderRadius: "3px", marginBottom: "16px" }}>
                <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
                  <span style={{ fontSize: "13px", fontWeight: "bold", color: selectedTrade.instrument.color, fontFamily: "monospace" }}>{selectedTrade.instrument.label}</span>
                  <span style={{ fontSize: "11px", color: "#8AA0C0" }}>{selectedTrade.instrument.desc}</span>
                </div>
              </div>
            )}

            {/* Nota ISIN contestuale */}
            {tickerDetail && tickerDetail.description && (
              <div style={{ background: "#080C18", border: "1px solid #1A2A4A", borderLeft: "3px solid #4A6A9A", padding: "10px 14px", borderRadius: "3px", marginBottom: "16px", fontSize: "11px", color: "#8AA0C0", lineHeight: "1.6" }}>
                {tickerDetail.description}
              </div>
            )}
            {/* Nota ISIN */}
            <div style={{ background: "#080C18", border: "1px solid #1A2A4A", borderLeft: "3px solid #4A6A9A", padding: "10px 14px", borderRadius: "3px", marginBottom: "16px", fontSize: "11px", color: "#4A6A9A", lineHeight: "1.6" }}>
              {tickerDetail && tickerDetail.isin
                ? "✅ ISIN recuperato automaticamente. Il codice ISIN non è incluso nelle disclosure STOCK Act — viene risolto dal ticker."
                : "ℹ️ ISIN non disponibile per questo ticker. Potrebbe trattarsi di un'opzione, un warrant, o un titolo molto recente. Cerca manualmente su openfigi.com o isin.org."
              }
            </div>

            {/* Link esterni */}
            <div style={{ fontSize: "10px", color: "#4A6A9A", letterSpacing: "0.15em", marginBottom: "8px" }}>RISORSE ESTERNE</div>
            <div style={{ display: "flex", gap: "8px", flexWrap: "wrap" }}>
              {[
                { label: "Yahoo Finance", url: "https://finance.yahoo.com/quote/" + selectedTrade.ticker },
                { label: "OpenFIGI / ISIN", url: "https://www.openfigi.com/search#!?simpleSearchString=" + selectedTrade.ticker },
                { label: "Capitol Trades", url: "https://www.capitoltrades.com/trades?ticker=" + selectedTrade.ticker },
                { label: "Quiver Congress", url: "https://www.quiverquant.com/sources/congresstrading" },
              ].map(function(link) {
                return (
                  <a key={link.label} href={link.url} target="_blank" rel="noreferrer"
                    style={{ background: "#0D1426", border: "1px solid #1A2A4A", color: "#00C8FF", padding: "6px 12px", fontSize: "11px", borderRadius: "2px", textDecoration: "none", fontFamily: "monospace" }}>
                    {link.label} ↗
                  </a>
                );
              })}
            </div>
          </div>
        </div>
      )}
      <div style={{ background: "#0D1426", borderBottom: "1px solid #1A2A4A", padding: "8px 0", overflow: "hidden" }}>
        <div style={{ whiteSpace: "nowrap", display: "inline-block", animation: "ticker 60s linear infinite", color: "#00D4AA", fontSize: "12px", letterSpacing: "0.05em" }}>
          {tickerText || "CARICAMENTO DATI..."}&nbsp;&nbsp;&nbsp;{tickerText}
        </div>
      </div>

      {/* BARRA DI FASE */}
      {loadPhase !== "done" && loadPhase !== "idle" && (
        <div style={{ height: "2px", background: "#0D1426", position: "relative", overflow: "hidden" }}>
          <div style={{ position: "absolute", top: 0, left: 0, height: "100%", background: loadPhase === "error" ? "#FF4455" : "#00D4AA", width: phaseWidth, transition: "width 0.8s ease" }} />
        </div>
      )}

      <div style={{ maxWidth: "1400px", margin: "0 auto", padding: "20px 16px" }}>

        {/* HEADER */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "24px" }}>
          <div>
            <div style={{ fontSize: "11px", color: "#4A6A9A", letterSpacing: "0.2em", marginBottom: "4px" }}>SISTEMA DI MONITORAGGIO</div>
            <h1 style={{ margin: 0, fontSize: "22px", fontWeight: "bold", color: "#E8F4FF", letterSpacing: "0.05em" }}>CONGRESS TRADE TRACKER</h1>
            <div style={{ fontSize: "11px", color: "#4A6A9A", marginTop: "4px" }}>STOCK ACT 2012 · DATI PUBBLICI</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "8px", justifyContent: "flex-end", marginBottom: "6px" }}>
              <div style={{ width: "7px", height: "7px", borderRadius: "50%", background: "#00D4AA", animation: "pulse 2s ease-in-out infinite" }} />
              <span style={{ color: "#00D4AA", fontSize: "12px" }}>LIVE</span>
              <button onClick={function() { setKeyDraft(keys); setShowSetup(true); }}
                style={{ background: "#0D1426", border: "1px solid #1A2A4A", color: "#4A6A9A", padding: "3px 10px", fontSize: "11px", fontFamily: "'Courier New', monospace", cursor: "pointer", borderRadius: "2px", marginLeft: "8px" }}>
                ⚙ API
              </button>
            </div>
            <div style={{ display: "flex", gap: "10px", justifyContent: "flex-end", marginBottom: "4px" }}>
              <span style={{ fontSize: "10px", color: "#4A6A9A" }}><StatusDot status={apiStatus.congress} />Congress.gov</span>
              <span style={{ fontSize: "10px", color: "#4A6A9A" }}><StatusDot status={apiStatus.quiver} />Quiver</span>
            </div>
            {lastUpdate && <div style={{ color: "#4A6A9A", fontSize: "11px" }}>Aggiornato: {lastUpdate.toLocaleTimeString("it-IT")}</div>}
            <div style={{ color: "#4A6A9A", fontSize: "11px" }}>{filtered.length} operazioni {phaseLabel && ("· " + phaseLabel)}</div>
          </div>
        </div>

        {/* ALERTS */}
        {alerts.slice(0, 3).map(function(a) {
          return (
            <div key={a.id} style={{ background: "#0D1A10", border: "1px solid #1A4A2A", borderLeft: "3px solid #00D4AA", padding: "8px 14px", fontSize: "12px", color: "#00D4AA", marginBottom: "6px", animation: "fadeIn 0.3s ease", borderRadius: "2px" }}>
              🔔 {a.text} <span style={{ color: "#4A6A9A", marginLeft: "12px" }}>{a.time.toLocaleTimeString("it-IT")}</span>
            </div>
          );
        })}

        {/* LEGGENDA PRIORITÀ */}
        <div style={{ background: "#0A0F1E", border: "1px solid #1A2A4A", borderRadius: "4px", padding: "16px", marginBottom: "20px" }}>
          <div style={{ fontSize: "10px", color: "#4A6A9A", letterSpacing: "0.2em", marginBottom: "12px" }}>GUIDA ALLA PRIORITÀ</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: "12px" }}>
            {[
              { tier: 1, icon: "👑", title: "LEADERSHIP",   why: "Speaker e Leader vedono tutta la legislazione prima che diventi pubblica.",          risk: "RISCHIO MASSIMO",  ex: "Pelosi, Johnson, Schumer" },
              { tier: 2, icon: "⚡", title: "WHIP",         why: "Sanno in anticipo quali leggi passeranno. Info critica su settori regolamentati.",   risk: "RISCHIO ALTO",     ex: "Emmer, Clark, Durbin" },
              { tier: 3, icon: "🏛️", title: "COMMITTEE",   why: "Ricevono briefing classificati e influenzano i settori su cui investono.",           risk: "RISCHIO ALTO",     ex: "Jordan, Tuberville, Schiff" },
              { tier: 4, icon: "📈", title: "TOP TRADER",   why: "Storicamente documentati con rendimenti anomali (+50–100% annuo).",                  risk: "TRACK RECORD",     ex: "Crenshaw, Rouzer, Davidson" },
            ].map(function(item) {
              var s = TIER_STYLE[item.tier];
              return (
                <div key={item.tier} style={{ background: s.bg, border: "1px solid " + s.border, borderTop: "3px solid " + s.color, borderRadius: "3px", padding: "12px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "8px" }}>
                    <span style={{ fontSize: "14px" }}>{item.icon}</span>
                    <span style={{ fontSize: "11px", color: s.color, fontWeight: "bold" }}>{item.title}</span>
                  </div>
                  <p style={{ fontSize: "11px", color: "#8AA0C0", margin: "0 0 8px 0", lineHeight: "1.5" }}>{item.why}</p>
                  <div style={{ fontSize: "10px", color: s.color, marginBottom: "4px" }}>⚠ {item.risk}</div>
                  <div style={{ fontSize: "10px", color: "#4A6A9A", fontStyle: "italic" }}>es. {item.ex}</div>
                </div>
              );
            })}
          </div>
          <div style={{ marginTop: "12px", padding: "8px 12px", background: "#080C18", border: "1px solid #1A2A4A", borderRadius: "3px", fontSize: "11px", color: "#4A6A9A", lineHeight: "1.6" }}>
            💡 Concentrati sulle operazioni da <strong style={{ color: "#FFB347" }}>$100K+</strong> dei membri LEADERSHIP e COMMITTEE, specialmente quando il settore corrisponde alla loro commissione. I leader del Congresso battono il mercato fino al <strong style={{ color: "#FFB347" }}>47% annuo</strong> dopo aver assunto ruoli di potere (NBER, 2025).
          </div>
        </div>

        {/* FILTRI */}
        <div style={{ background: "#0A0F1E", border: "1px solid #1A2A4A", borderRadius: "4px", padding: "16px", marginBottom: "20px", display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr 1fr", gap: "12px" }}>
          <div>
            <label style={{ fontSize: "10px", color: "#4A6A9A", letterSpacing: "0.15em", display: "block", marginBottom: "6px" }}>MEMBRO / TICKER</label>
            <input type="text" placeholder="es. Pelosi, AAPL…" value={filters.member}
              onChange={function(e) { setFilters(function(f) { return Object.assign({}, f, { member: e.target.value }); }); }}
              style={{ width: "100%", background: "#050810", border: "1px solid #1A2A4A", color: "#C8D8F0", padding: "8px 10px", fontSize: "12px", fontFamily: "'Courier New', monospace", borderRadius: "2px", boxSizing: "border-box", outline: "none" }}
            />
          </div>
          <div>
            <label style={{ fontSize: "10px", color: "#4A6A9A", letterSpacing: "0.15em", display: "block", marginBottom: "6px" }}>SETTORE</label>
            <select value={filters.sector} onChange={function(e) { setFilters(function(f) { return Object.assign({}, f, { sector: e.target.value }); }); }}
              style={{ width: "100%", background: "#050810", border: "1px solid #1A2A4A", color: "#C8D8F0", padding: "8px 10px", fontSize: "12px", fontFamily: "'Courier New', monospace", borderRadius: "2px", boxSizing: "border-box", outline: "none" }}>
              <option>All</option>
              {Object.keys(SECTORS).map(function(s) { return <option key={s}>{s}</option>; })}
              <option>Other</option>
            </select>
          </div>
          <div>
            <label style={{ fontSize: "10px", color: "#4A6A9A", letterSpacing: "0.15em", display: "block", marginBottom: "6px" }}>TIPO</label>
            <select value={filters.type} onChange={function(e) { setFilters(function(f) { return Object.assign({}, f, { type: e.target.value }); }); }}
              style={{ width: "100%", background: "#050810", border: "1px solid #1A2A4A", color: "#C8D8F0", padding: "8px 10px", fontSize: "12px", fontFamily: "'Courier New', monospace", borderRadius: "2px", boxSizing: "border-box", outline: "none" }}>
              <option value="All">Tutti</option>
              <option value="Purchase">Solo Acquisti</option>
              <option value="Sale">Solo Vendite</option>
            </select>
          </div>
          <div>
            <label style={{ fontSize: "10px", color: "#4A6A9A", letterSpacing: "0.15em", display: "block", marginBottom: "6px" }}>VOLUME MINIMO</label>
            <select value={filters.minAmount} onChange={function(e) { setFilters(function(f) { return Object.assign({}, f, { minAmount: Number(e.target.value) }); }); }}
              style={{ width: "100%", background: "#050810", border: "1px solid #1A2A4A", color: "#C8D8F0", padding: "8px 10px", fontSize: "12px", fontFamily: "'Courier New', monospace", borderRadius: "2px", boxSizing: "border-box", outline: "none" }}>
              <option value={0}>Qualsiasi</option>
              <option value={100000}>$100K+ — Rilevante</option>
              <option value={250000}>$250K+ — Significativo</option>
              <option value={500000}>$500K+ — Alto</option>
              <option value={1000000}>$1M+ — Critico</option>
            </select>
          </div>
          <div>
            <label style={{ fontSize: "10px", color: "#FFB347", letterSpacing: "0.15em", display: "block", marginBottom: "6px" }}>⚠ RISCHIO ABUSO</label>
            <select value={filters.minRisk} onChange={function(e) { setFilters(function(f) { return Object.assign({}, f, { minRisk: e.target.value }); }); }}
              style={{ width: "100%", background: "#050810", border: "1px solid #6A4000", color: "#FFB347", padding: "8px 10px", fontSize: "12px", fontFamily: "'Courier New', monospace", borderRadius: "2px", boxSizing: "border-box", outline: "none", fontWeight: "bold" }}>
              <option value="All">Tutti i livelli</option>
              <option value="MEDIO">🟡 Solo Medio+ (36+)</option>
              <option value="ALTO">🔴 Solo Alto (66+)</option>
            </select>
          </div>
        </div>

        {/* STATS */}
        {!loading && (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: "12px", marginBottom: "20px" }}>
            {[
              { label: "OPERAZIONI TOTALI", value: filtered.length },
              { label: "ACQUISTI",          value: filtered.filter(function(t) { return t.type === "Purchase"; }).length, color: "#00D4AA" },
              { label: "VENDITE",           value: filtered.filter(function(t) { return isSale(t.type); }).length, color: "#FF4455" },
              { label: "VOLUME EST.",       value: formatAmount(filtered.reduce(function(s, t) { return s + t.amountNum; }, 0)), color: "#FFB347" },
            ].map(function(stat) {
              return (
                <div key={stat.label} style={{ background: "#0A0F1E", border: "1px solid #1A2A4A", padding: "14px 16px", borderRadius: "4px" }}>
                  <div style={{ fontSize: "10px", color: "#4A6A9A", letterSpacing: "0.15em", marginBottom: "6px" }}>{stat.label}</div>
                  <div style={{ fontSize: "22px", fontWeight: "bold", color: stat.color || "#E8F4FF" }}>{stat.value}</div>
                </div>
              );
            })}
          </div>
        )}

        {/* TABELLA */}
        <div style={{ background: "#0A0F1E", border: "1px solid #1A2A4A", borderRadius: "4px", overflow: "hidden" }}>
          <div style={{ display: "grid", gridTemplateColumns: "100px 60px 185px 85px 155px 60px 65px 55px", padding: "8px 16px", borderBottom: "1px solid #1A2A4A", fontSize: "10px", color: "#4A6A9A", letterSpacing: "0.12em" }}>
            <span>DATA</span><span>TICKER</span><span>MEMBRO</span><span>TIPO</span><span>IMPORTO</span>
            <span>% PAT.</span><span>STRUMT.</span>
            <span style={{ color: "#FFB347" }}>RISCHIO</span>
          </div>

          <div style={{ maxHeight: "500px", overflowY: "auto" }}>
            {loading ? (
              <div>
                {Array.from({ length: 8 }).map(function(_, i) {
                  return (
                    <div key={i} style={{ display: "grid", gridTemplateColumns: "100px 60px 185px 85px 155px 60px 65px 55px", padding: "10px 16px", borderBottom: "1px solid #0D1426", background: i % 2 === 0 ? "#0A0F1E" : "#080C18", gap: "8px", alignItems: "center" }}>
                      {[80, 40, 140, 70, 120, 40, 50, 30].map(function(w, j) {
                        return <div key={j} style={{ height: "10px", borderRadius: "2px", background: "#0D1A2E", width: w + "px", animation: "pulse 1.5s ease-in-out infinite", animationDelay: (i * 0.05 + j * 0.03) + "s" }} />;
                      })}
                    </div>
                  );
                })}
              </div>
            ) : filtered.length === 0 ? (
              <div style={{ padding: "40px", textAlign: "center", color: "#4A6A9A" }}>Nessuna operazione trovata con i filtri attuali.</div>
            ) : filtered.slice(0, 100).map(function(t, i) {
              var ts = t.tier > 0 ? TIER_STYLE[t.tier] : null;
              var rowBg = t.isNew ? "#0A1A0E" : ts ? ts.bg : i % 2 === 0 ? "#0A0F1E" : "#080C18";
              var leftBorder = ts ? "3px solid " + ts.color : t.isNew ? "3px solid #00D4AA" : "3px solid transparent";
              return (
                <div key={t.id} className="trade-row" onClick={function() { setSelectedTrade(t); fetchTickerDetail(t.ticker); }}
                  style={{ display: "grid", gridTemplateColumns: "100px 60px 185px 85px 155px 60px 65px 55px", padding: "9px 16px", borderBottom: "1px solid #0D1426", borderLeft: leftBorder, background: rowBg, alignItems: "center", fontSize: "12px", cursor: "pointer" }}>
                  <span style={{ color: "#4A6A9A", fontSize: "11px" }}>{t.transaction_date}</span>
                  <span style={{ color: "#E8F4FF", fontWeight: "bold", background: "#1A2A4A", padding: "2px 6px", borderRadius: "2px", display: "inline-block", fontSize: "11px" }}>{t.ticker}</span>
                  <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                    <span style={{ color: ts ? ts.color : "#C8D8F0", fontWeight: ts ? "bold" : "normal" }}>{t.representative}</span>
                    {ts && <span style={{ marginLeft: "6px", fontSize: "9px", color: ts.color, border: "1px solid " + ts.border, background: ts.bg, padding: "1px 5px", borderRadius: "2px", verticalAlign: "middle" }}>{ts.label}</span>}
                    {t.isNew && <span className="new-badge" style={{ marginLeft: "6px", fontSize: "9px", color: "#00D4AA", border: "1px solid #00D4AA", padding: "1px 5px", borderRadius: "2px" }}>NEW</span>}
                  </span>
                  <span style={{ color: isSale(t.type) ? "#FF4455" : "#00D4AA", fontWeight: "bold", fontSize: "11px" }}>
                    {isSale(t.type) ? "▼" : "▲"} {(t.type || "").replace("Sale (Full)", "Vend.").replace("Sale (Partial)", "Vend.P.").replace("Purchase", "Acq.").replace("Exchange", "Scamb.")}
                  </span>
                  <span style={{ color: "#FFB347", fontSize: "11px" }}>{t.amount}</span>
                  <span style={{ fontSize: "11px", fontWeight: "bold", color: t.wealthPct ? (t.wealthPct >= 5 ? "#FF4455" : t.wealthPct >= 1 ? "#FFB347" : "#8AA0C0") : "#2A3A5A" }}>
                    {t.wealthPct ? formatPct(t.wealthPct) : "—"}
                  </span>
                  <span style={{ fontSize: "10px", fontWeight: "bold", color: t.instrument ? t.instrument.color : "#4A6A9A", background: "#0D1426", padding: "2px 4px", borderRadius: "2px", textAlign: "center" }}>
                    {t.instrument ? t.instrument.label : "—"}
                  </span>
                  {/* SEMAFORO ANOMALIA */}
                  <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: "2px" }}>
                    <div style={{
                      width: "28px", height: "28px", borderRadius: "50%",
                      background: t.anomaly ? t.anomaly.color : "#2A3A5A",
                      boxShadow: t.anomaly && t.anomaly.score >= 66 ? "0 0 8px " + t.anomaly.color : "none",
                      display: "flex", alignItems: "center", justifyContent: "center",
                      fontSize: "9px", fontWeight: "bold", color: "#050810",
                    }}>
                      {t.anomaly ? t.anomaly.score : "?"}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        <div style={{ marginTop: "12px", textAlign: "center", fontSize: "10px", color: "#2A3A5A" }}>
          DATI PUBBLICI AI SENSI DELLO STOCK ACT (2012) · HOUSE STOCK WATCHER · SOLO A SCOPO INFORMATIVO
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/Congress-Tracker/sw.js')
      .then(function(reg) { console.log('SW registrato:', reg.scope); })
      .catch(function(err) { console.warn('SW non registrato:', err); });
  });
}
</script>
</body>
</html>
