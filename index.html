function getSector(ticker){
  if(!ticker) return "Other";
  for(var s in SECTORS){ if(SECTORS[s].indexOf(ticker.toUpperCase())!==-1) return s; }

}
function parseAmount(str){
  if(!str) return 0;
  var r={"$1,001 - $15,000":8000,"$15,001 - $50,000":32500,"$50,001 - $100,000":75000,
    "$100,001 - $250,000":175000,"$250,001 - $500,000":375000,"$500,001 - $1,000,000":750000,
    "$1,000,001 - $5,000,000":3000000,"$5,000,001 - $25,000,000":15000000,"Over $25,000,000":25000000};
  return r[str]||0;
}
function fmtAmt(n){
  if(n>=1000000) return "$"+(n/1000000).toFixed(1)+"M";
  if(n>=1000)    return "$"+(n/1000).toFixed(0)+"K";
  return "$"+n.toLocaleString();
}
function fmtPct(p){
  if(p===null) return null;
  if(p>=10) return p.toFixed(1)+"%";
  if(p>=1)  return p.toFixed(2)+"%";
  return p.toFixed(3)+"%";
}
function isSale(t){ return t&&t.toLowerCase().indexOf("sale")!==-1; }
function daysBetween(d1,d2){ return Math.abs((new Date(d1)-new Date(d2))/(86400000)); }

var COMMITTEE_SECTORS={

var RECENT_LEGISLATION=[
  {sector:"Technology",title:"AI Export Controls",date:"2024-10-15",desc:"Restrizioni export chip AI verso Cina"},
  {sector:"Technology",title:"CHIPS Act estensioni",date:"2024-08-01",desc:"Sussidi fab semiconduttori USA"},

  {sector:"Healthcare",title:"GLP-1 Medicare",date:"2025-03-01",desc:"Copertura Medicare farmaci obesità"},
];
function calcAnomalyScore(trade, allTrades){
  var f1=0,f1r=null,f2=0,f2r=null,f3=0,f3r=null,lev=0,levr=null;
  // F1: committee correlation
  var role=trade.role; var sector=trade.sector; var tier=trade.tier;
  if(tier===1){f1=30;f1r="Leadership con accesso a tutta la legislazione";}
  else if(tier===2){f1=20;f1r="Whip con visione completa dei voti imminenti";}
  else if(role&&COMMITTEE_SECTORS[role]&&COMMITTEE_SECTORS[role].indexOf(sector)!==-1){f1=40;f1r="Settore coincide con commissione ("+role+")";}
  // F2: timing
  var best=0,bestr=null;
  RECENT_LEGISLATION.forEach(function(law){
    if(law.sector!==sector) return;
    var days=daysBetween(trade.transaction_date,law.date);
    var sc=days<=14?35:days<=30?28:days<=60?18:days<=90?8:0;
    if(sc>best){best=sc;var dir=new Date(trade.transaction_date)<new Date(law.date)?"prima":"dopo";bestr=Math.round(days)+" gg "+dir+": \""+law.title+"\" — "+law.desc;}
  });
  f2=best;f2r=bestr;
  // F3: volume
  var mt=allTrades.filter(function(t){return t.representative===trade.representative&&t.id!==trade.id;});
  var amt=trade.amountNum;
  if(mt.length<3){
    if(amt>=1000000){f3=25;f3r="Importo >$1M (assoluto)";}
    else if(amt>=500000){f3=18;f3r="Importo >$500K (assoluto)";}
    else if(amt>=250000){f3=10;f3r="Importo >$250K (assoluto)";}
    else if(amt>=100000){f3=5;f3r="Importo >$100K (assoluto)";}
  } else {
    var amts=mt.map(function(t){return t.amountNum||0;}).sort(function(a,b){return b-a;});
    var avg=amts.reduce(function(s,v){return s+v;},0)/amts.length;
    var p90=amts[Math.floor(amts.length*0.10)];
    var p75=amts[Math.floor(amts.length*0.25)];
    if(amt>=p90&&p90>0){f3=25;f3r="Top 10% dello storico (media: "+fmtAmt(avg)+")";}
    else if(amt>=p75&&p75>0){f3=15;f3r="Top 25% dello storico (media: "+fmtAmt(avg)+")";}
    else if(amt>=avg&&avg>0){f3=8;f3r="Superiore alla media ("+fmtAmt(avg)+")";}
    else{f3=3;f3r="Nella norma dello storico";}
  }
  // Leverage
  var tp=(trade.type||"").toLowerCase();
  if(tp.indexOf("call")!==-1||tp.indexOf("put")!==-1){lev=10;levr="Uso opzioni amplifica anomalia";}
  var total=Math.min(100,f1+f2+f3+lev);
  var reasons=[];
  if(f1r) reasons.push("Commissione: "+f1r);
  if(f2r) reasons.push("Timing: "+f2r);
  if(f3r) reasons.push("Volume: "+f3r);
  if(levr) reasons.push("Leva: "+levr);
  var level,color,bg,border;
  if(total>=66){level="ALTO";color="#FF4455";bg="#2A0A0A";border="#6A1A1A";}
  else if(total>=36){level="MEDIO";color="#FFB347";bg="#2A1800";border="#6A4000";}
  else{level="BASSO";color="#00D4AA";bg="#002A1A";border="#006A40";}
  return {score:total,level:level,color:color,bg:bg,border:border,reasons:reasons,
    breakdown:{committee:f1,timing:f2,volume:f3,leverage:lev}};
}

// ── Instrument parser ─────────────────────────────────────────────────────────
function parseInstrument(type){
  var s=(type||"").toLowerCase();
  if(s.indexOf("call")!==-1) return{label:"CALL",color:"#00D4AA",desc:"Opzione Call — leva al rialzo"};
  if(s.indexOf("put")!==-1)  return{label:"PUT",color:"#FF4455",desc:"Opzione Put — leva al ribasso"};
  if(s.indexOf("option")!==-1) return{label:"OPTION",color:"#FFB347",desc:"Opzione — strumento con leva"};
  if(s.indexOf("etf")!==-1||s.indexOf("fund")!==-1) return{label:"ETF",color:"#00C8FF",desc:"ETF — nessuna leva"};
  if(s.indexOf("bond")!==-1||s.indexOf("treasury")!==-1) return{label:"BOND",color:"#8AA0C0",desc:"Obbligazione"};
  return{label:"STOCK",color:"#C8D8F0",desc:"Azione ordinaria"};
}

  n=n||40;
  return Array.from({length:n},function(_,i){
    var ticker=MOCK_TICKERS[Math.floor(Math.random()*MOCK_TICKERS.length)];
    var amount=MOCK_AMOUNTS[Math.floor(Math.random()*MOCK_AMOUNTS.length)];

    var d=new Date(); d.setDate(d.getDate()-Math.floor(Math.random()*30));
    var info=getMemberInfo(rep,STATIC_ROLES);
    return{id:"mock-"+i+"-"+Date.now(),representative:rep,ticker:ticker,
      transaction_date:d.toISOString().split("T")[0],
      type:MOCK_TYPES[Math.floor(Math.random()*MOCK_TYPES.length)],
      amount:amount,amountNum:parseAmount(amount),sector:getSector(ticker),
      isNew:i<3,role:info.role,tier:info.tier,
      instrument:parseInstrument(MOCK_TYPES[Math.floor(Math.random()*MOCK_TYPES.length)]),
      anomaly:null};
  }).sort(function(a,b){return new Date(b.transaction_date)-new Date(a.transaction_date);});
}
function enrichAll(list){
  return list.map(function(t){return Object.assign({},t,{anomaly:calcAnomalyScore(t,list)});});
